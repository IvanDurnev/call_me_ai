<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Подтверждение почты</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='call.css', v='20260409mail') }}">
  </head>
  <body class="miniapp-page account-page">
    <main class="call-shell account-shell">
      <section class="phone-frame">
        <div class="phone-screen account-screen">
          <div class="voices-header">
            <p class="eyebrow">Код подтверждения</p>
            <h1>Проверьте почту</h1>
            <p class="lead">Мы отправили одноразовый код на <strong>{{ email }}</strong>. Введите его ниже, чтобы подтвердить почту и продолжить.</p>
          </div>

          <form class="hero-form account-form" method="post">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="purpose" value="{{ purpose }}">
            <input type="hidden" name="next" value="{{ next_url }}">
            <label class="hero-field auth-code-field">
              <span>Одноразовый код</span>
              <input class="auth-code-input" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" placeholder="123456">
            </label>
            {% if info %}
              <div class="hero-status">{{ info }}</div>
            {% endif %}
            {% if error %}
              <div class="hero-status is-error">{{ error }}</div>
            {% endif %}
            <div class="hero-actions">
              <button class="call-btn call-btn-primary" type="submit" name="action" value="verify">Подтвердить</button>
              <button class="call-btn call-btn-secondary" type="submit" name="action" value="resend" formnovalidate>Отправить код ещё раз</button>
              <a class="call-btn call-btn-secondary call-link-btn" href="{{ url_for('main.login_email', next=next_url, email=email) }}">Изменить email</a>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
