<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Подключаем аккаунт</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='call.css', v='20260412authbtn') }}">
  </head>
  <body
    class="miniapp-page account-page"
    data-telegram-auth-url="{{ telegram_auth_url }}"
    data-telegram-auth-mode="redirect"
    data-telegram-next-url="{{ next_url }}"
  >
    <main class="call-shell account-shell">
      <section class="phone-frame">
        <div class="phone-screen account-screen">
          <div class="voices-header">
            <p class="eyebrow">Telegram</p>
            <h1>Подключаем аккаунт</h1>
            <p class="lead" id="telegram-auth-status">Проверяем ваш профиль в Telegram и открываем звонок…</p>
          </div>
          <div class="hero-actions">
            <a class="call-btn call-btn-secondary call-link-btn" href="{{ url_for('main.register', next=next_url) }}">Регистрация</a>
            <a class="call-btn call-btn-secondary call-link-btn" href="{{ url_for('main.index') }}">На главную</a>
          </div>
        </div>
      </section>
    </main>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="{{ url_for('static', filename='telegram-auth.js', v='20260412tgauth2') }}"></script>
  </body>
</html>
